# netlify.toml — front end on Netlify, API proxied to your Render backend.
# Only "public" is served. Replace the Render host in the /api rule below.

[build]
  publish = "public"

# ---- pretty URLs ----
[[redirects]]
  from = "/learner"
  to   = "/learner.html"
  status = 200
[[redirects]]
  from = "/educator"
  to   = "/educator.html"
  status = 200
[[redirects]]
  from = "/institution"
  to   = "/institution.html"
  status = 200
[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# ---- API proxy → Render (REPLACE the host; keep status 200 so it proxies) ----
[[redirects]]
  from = "/api/*"
  to   = "https://YOUR-RENDER-SERVICE.onrender.com/api/:splat"
  status = 200
  force = true
